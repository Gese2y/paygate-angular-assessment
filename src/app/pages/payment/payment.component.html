<mat-card>

  <form [formGroup]="form">

    <mat-form-field appearance="outline">

      <mat-label>Amount</mat-label>

      <input
        matInput
        formControlName="amount"
        appNumericOnly>

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>Note</mat-label>

      <textarea
        matInput
        maxlength="50"
        formControlName="note">
      </textarea>

      <mat-hint align="end">
        {{ form.get('note')?.value?.length || 0 }}/50
      </mat-hint>

    </mat-form-field>

    <mat-radio-group formControlName="method">

      <mat-radio-button value="mobile">
        Mobile Wallet
      </mat-radio-button>

      <mat-radio-button value="bank">
        Bank Transfer
      </mat-radio-button>

    </mat-radio-group>

  </form>

</mat-card>
@if(form.contains('phoneNumber')) {

<mat-form-field>
  <input
    matInput
    formControlName="phoneNumber">
</mat-form-field>

<mat-form-field>
  <mat-select formControlName="provider">
    <mat-option value="Telebirr">
      Telebirr
    </mat-option>
    <mat-option value="M-Birr">
      M-Birr
    </mat-option>
    <mat-option value="HelloCash">
      HelloCash
    </mat-option>
  </mat-select>
</mat-form-field>

}
